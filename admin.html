<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPR Trainer — Admin Dashboard</title>
  <meta name="description" content="Admin dashboard for managing CPR training sessions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-body">

  <div class="app-container">
    
    <!-- Top Navbar -->
    <header class="navbar">
      <div class="nav-left">
        <div class="logo">
          <div class="logo-pulse connected"></div>
          <span class="logo-text">CPR<span class="logo-accent">Trainer</span></span>
        </div>
      </div>
      
      <nav class="nav-center">
        <a href="/index.html" class="nav-link">Dashboard</a>
        <a href="/admin.html" class="nav-link active">Admin Dashboard</a>
      </nav>

      <div class="nav-right">
        <div class="user-info">
          <span class="username" id="adminUser">—</span>
          <button class="btn-logout" id="logoutBtn" title="Logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="dashboard-main">
      
      <!-- Admin Stats Row -->
      <section class="metrics-grid">
        <div class="card metric-card">
          <div class="card-header"><span class="card-title">Total Sessions</span></div>
          <div class="metric-body">
            <div class="main-value" id="statSessions">0</div>
          </div>
        </div>
        <div class="card metric-card">
          <div class="card-header"><span class="card-title">Total Compressions</span></div>
          <div class="metric-body">
            <div class="main-value" id="statCompressions">0</div>
          </div>
        </div>
        <div class="card metric-card">
          <div class="card-header"><span class="card-title">Avg Score</span></div>
          <div class="metric-body">
            <div class="main-value" id="statAvgScore">0.0</div>
          </div>
        </div>
        <div class="card metric-card">
          <div class="card-header"><span class="card-title">Avg Good Rate</span></div>
          <div class="metric-body">
            <div class="main-value" id="statGoodRate">0%</div>
          </div>
        </div>
      </section>

      <!-- Sessions List -->
      <section class="card history-card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
          <h3 class="card-title">All Training Sessions</h3>
          <div style="display: flex; gap: 12px;">
            <button class="btn-logout" id="exportBatchBtn" style="background: rgba(0, 240, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export Excel
            </button>
            <button class="btn-logout" id="refreshBtn" style="background: rgba(255, 255, 255, 0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
              Refresh Data
            </button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="history-table" id="sessionsTable">
            <thead>
              <tr>
                <th style="width: 40px; text-align: center;">
                  <input type="checkbox" id="selectAllCheckbox" style="cursor: pointer; transform: scale(1.2);">
                </th>
                <th>#</th>
                <th>Trainee</th>
                <th>Date/Time</th>
                <th>Count</th>
                <th>Avg Force</th>
                <th>Avg Depth</th>
                <th>Avg BPM</th>
                <th>Good</th>
                <th>Score</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="sessionsBody">
              <tr class="empty-state"><td colspan="11">Loading data...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal card">
      <div class="modal-header">
        <div class="modal-title-group">
          <h3 id="modalTitle" style="margin-bottom: 4px;">Session Detail</h3>
          <p id="modalSub" class="username"></p>
        </div>
        <button class="modal-close-btn" id="modalClose" title="Close">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modalStats" class="metrics-grid" style="grid-template-columns: repeat(4, 1fr); margin: 20px 0; gap: 12px;"></div>
      <div class="table-responsive" style="max-height: 400px;">
        <table class="history-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Force</th>
              <th>Depth</th>
              <th>BPM</th>
              <th>Status</th>
              <th>Recoil</th>
              <th>FSR</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="modalBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <style>
    /* Admin specific modal styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal {
      width: 100%;
      max-width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .modal-close-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .modal-close-btn:hover {
      background: rgba(255, 0, 85, 0.1);
      color: var(--neon-magenta);
      border-color: var(--neon-magenta);
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
      transform: rotate(90deg);
    }
    .modal .history-table th, .modal .history-table td {
      white-space: nowrap;
    }
  </style>

  <script src="js/admin.js"></script>
</body>
</html>
